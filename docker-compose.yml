# BCE Pipeline — dev stack (mongo, tor, hadoop, airflow)
# KBO CSV : définir KBO_HOST_PATH dans .env (chemin absolu Windows)

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file: .env
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    PYTHONPATH: /opt/airflow
    MONGO_URI: mongodb://mongo:27017
    KBO_DATA_DIR: /data/kbo
    BRONZE_ROOT: /opt/airflow/bronze
    HDFS_WEBHDFS_URL: ""
    TOR_SOCKS_HOST: tor
    TOR_CONTROL_HOST: tor
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src/bce:/opt/airflow/bce
    - ${KBO_HOST_PATH}:/data/kbo:ro
    - ./bronze:/opt/airflow/bronze
  depends_on:
    postgres:
      condition: service_healthy
    mongo:
      condition: service_started

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  tor:
    image: dperson/torproxy
    ports:
      - "9050:9050"
      - "9051:9051"

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    environment:
      - CLUSTER_NAME=bce
    ports:
      - "9870:9870"
    volumes:
      - hadoop_namenode:/hadoop/dfs/name

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    environment:
      - SERVICE_PRECONDITION=namenode:9870
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    depends_on:
      - namenode

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --password admin \
          --firstname Admin --lastname User --role Admin --email admin@example.com || true

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8082:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

volumes:
  mongo_data:
  postgres_data:
  hadoop_namenode:
  hadoop_datanode:
  bronze_data:
